name: Test Package

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: "Dart ${{ matrix.sdk }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test against different Dart versions to ensure broad compatibility
        sdk: [ '3.0.0', '3.3.0', 'stable', 'beta' ]
        
    steps:
      - uses: actions/checkout@v4
      
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}
          
      - name: Install dependencies
        run: dart pub get
        
      - name: Analyze code
        run: dart analyze --fatal-infos
        
      - name: Run tests
        run: dart test

  test-lowest-deps:
    name: "Test Lowest Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
          
      - name: Install dependencies (lowest versions)
        # Tests your lower bounds (e.g. analyzer >=5.0.0)
        run: dart pub downgrade
        
      - name: Run tests on lowest dependencies
        run: dart test
