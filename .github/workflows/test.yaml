name: Test Package

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: "Flutter ${{ matrix.channel }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test against different Flutter channels to ensure broad compatibility
        channel: [ 'stable', 'beta' ]
        
    steps:
      - uses: actions/checkout@v4
      
      # Use subosito/flutter-action instead of setup-dart
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.channel }}
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --fatal-infos
        
      - name: Run unit tests
        run: dart test

  test-lowest-deps:
    name: "Test Lowest Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies (lowest versions)
        # Tests your lower bounds (e.g. analyzer >=5.0.0)
        run: flutter pub downgrade
        
      - name: Run tests on lowest dependencies
        run: dart test
